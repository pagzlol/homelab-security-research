campaign: NINGI-WRITEUP-011
description: mdrfckr SSH key injection with hardware/container fingerprint probe; libssh_0.12.0 scanner; same key as NINGI-004
block_days: 30
patterns:
  - match: "mdrfckr"
  - match: "lockr -ia .ssh"
  - match: "y6ekwUbyoOkk"
  - match: "ls -lh $(which ls)"
  - match: "AAAAB3NzaC1yc2EAAAABJQAAAQEArDp4"
